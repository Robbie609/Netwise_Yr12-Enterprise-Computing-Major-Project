<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwiser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="student_dashboard.css" rel="stylesheet">
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="bg-overlay"></div>

    <div id="login-view">
        <div class="login-card" id="login-box">
            <h1>Class Access</h1>
            <p>Enter your class code.</p>
            <div class="error-msg" id="error-msg">Incorrect access code. Please check again.</div>
            <div class="input-group">
                <input type="text" id="class-code" placeholder="ENTER CODE" autocomplete="off" spellcheck="false">
            </div>
            <br>
            <button class="btn-glow" id="access-btn">Submit Code</button>
        </div>
    </div>

    <div id="dashboard-view">
        
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo"><img src="Logo2.png" style="width: 45px; height: 45px;" alt="Netwiser Icon"></div>
                <div style="padding-right: 55%;"class="nav-links">
                    <a href="#" class="nav-item active">
                        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9.75L12 4l9 5.75v9.25a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1V9.75z"/>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="nav-item">
                        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 8.79 5 6.5 5A4.5 4.5 0 0 0 2 9.5V18a1 1 0 0 0 1.447.894C4.91 18.188 6.36 18 8 18c2.11 0 3.916.314 4 .5.084-.186 1.89-.5 4-.5 1.64 0 3.09.188 4.553.894A1 1 0 0 0 22 18V9.5A4.5 4.5 0 0 0 17.5 5c-2.29 0-4.332.477-5.5 1.253z"/>
                        </svg>
                        <span>Courses</span>
                    </a>
                </div>
            </div>
            <div class="nav-right">
                <div class="notification-wrapper">
                    <button class="notification-btn">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 1-5.714 0M18 8.25a6 6 0 1 0-12 0c0 7.372-3 8.25-3 8.25h18s-3-.878-3-8.25Zm-4.243 11.243a3 3 0 0 1-5.514 0"/>
                        </svg>
                        <div class="notification-badge">3</div>
                    </button>
                </div>
                <div class="profile-wrapper">
                    <button class="profile-btn" id="profileBtn">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 0 1 15 0"/>
                        </svg>
                    </button>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 0 1 15 0"/></svg>
                            </div>
                            <div>
                                <div class="profile-name">Student1</div>
                                <div class="profile-email">student1@netwiser.edu</div>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item">My Profile</a>
                        <a href="#" class="dropdown-item">About Us</a>
                        <div class="dropdown-divider"></div>
                        <a href="login_students.html" class="dropdown-item logout-item" onclick="location.reload()">Logout</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="hero-container">
            <div class="hero-card" id="hero-card">
                <div class="hero-content" id="hero-text-zone">
                    <div class="hero-label" id="hero-tag">Mission Progress</div>
                    <h2 class="hero-title" id="hero-title">Password Power</h2>
                    <p class="hero-desc" id="hero-desc">Loading parameters...</p>
                    <div class="progress-container">
                        <div class="progress-bar" id="hero-progress"></div>
                    </div>
                    <button class="btn-outline" id="hero-btn">Launch Mission</button>
                </div>
                <div class="hero-graphic" id="hero-graphic-zone">
                    <div class="cyber-shield-3d" id="hero-icon-container">
                        </div>
                </div>
            </div>
        </div>

        <div class="roadmap-wrapper">
            <div class="roadmap-header">
                <h3>Digital Safety Pathway</h3>
                <p>Select any open module to focus your dashboard viewport.</p>
            </div>

            <div class="hologram-panel">
                <div class="vertical-tree" id="vertical-tree-root">
                    </div>
            </div>
        </div>
    </div>

    <script src="student_dashboard.js">
    </script>
</body>
</html>
