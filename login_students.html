<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwiser | Log In</title>
    <link href="login_students.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="interactiveGrid"></canvas>

    <div class="branding-side">
        <div class="logo-container">
            <img src="Logo2.png" alt="Netwiser Icon" class="logo-img">
        </div>
        <h1>Welcome to the<br>Digital Future.</h1>
        <small>Fun Fact: Move your mouse around and pay attention to the grid!</small>
    </div>

    <div class="login-side">
        <div class="glass-panel" id="loginCard">
            <h2>Student Portal</h2>
            <div id="errorMsg" class="error-text">Oops! Incorrect username or password.</div>
            <form id="loginForm">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Student Username" required autocomplete="off">
                </div>
                <div class="input-box">
                    <input type="password" id="passInput" placeholder="Password" required>
                    <div class="pwd-toggle" id="togglePassword" title="Show/Hide Password">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <path class="pwd-slash" d="M3 3l18 18"></path>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="btn-access" id="loginBtn">Enter Academy</button>
            </form>
        </div>
    </div>

    <script>
        /* --- ORIGINAL AUTHENTICATION & UI LOGIC (RETAINED) --- */
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passInput = document.getElementById('passInput');
            const isPassword = passInput.getAttribute('type') === 'password';
            passInput.setAttribute('type', isPassword ? 'text' : 'password');
            this.classList.toggle('visible');
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const card = document.getElementById('loginCard');
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('http://127.0.0.1:8765/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await response.json();
                if (data.success) {
                    card.style.opacity = "0";
                    card.style.transform = "scale(0.95)";
                    setTimeout(() => { window.location.href = "student_dashboard.html"; }, 500);
                } else { throw new Error(); }
            } catch (error) {
                btn.innerText = "Enter Academy";
                btn.style.opacity = "1";
                err.style.display = "block";
                card.classList.remove('error-shake');
                void card.offsetWidth;
                card.classList.add('error-shake');
            }
        });

        /* --- NEW INTERACTIVE GRID SYSTEM (BACKGROUND ONLY) --- */
        const canvas = document.getElementById('interactiveGrid');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouse = { x: -1000, y: -1000 };
        let targetMouse = { x: -1000, y: -1000 };

        const gridSize = 55;
        const glowRadius = 200;
        const ease = 0.1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Interpolation for smooth trailing
            mouse.x += (targetMouse.x - mouse.x) * ease;
            mouse.y += (targetMouse.y - mouse.y) * ease;

            // 1. Draw Subtle Static Grid
            ctx.beginPath();
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgba(0, 242, 255, 0.06)";
            
            for (let x = 0; x <= width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
            }
            for (let y = 0; y <= height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            ctx.stroke();

            // 2. Draw Reactive Glow (Only affects existing lines)
            ctx.globalCompositeOperation = 'source-atop';
            const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, glowRadius);
            g.addColorStop(0, "rgba(0, 242, 255, 0.9)");
            g.addColorStop(0.5, "rgba(0, 85, 255, 0.3)");
            g.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, width, height);

            // 3. Draw Pulsing Intersections
            ctx.globalCompositeOperation = 'source-over';
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = 0; y <= height; y += gridSize) {
                    const d = Math.hypot(x - mouse.x, y - mouse.y);
                    if (d < glowRadius) {
                        const s = 1 - (d / glowRadius);
                        ctx.fillStyle = `rgba(0, 242, 255, ${s * 0.5})`;
                        ctx.fillRect(x - 1, y - 1, 2, 2);
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
