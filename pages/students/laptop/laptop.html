<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Netwiser | Cybersecurity Laptop Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="laptop.css">
</head>
<body>

<!-- AUTH GATE / LOADING -->
<div id="boot-view">
  <div class="boot-inner">
    <svg class="boot-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/>
    </svg>
    <span class="boot-label" id="boot-label">Booting NetwiserOS…</span>
    <div class="boot-bar"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
  </div>
</div>

<div id="error-view" style="display:none">
  <div class="error-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="#ff3366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <p id="error-message">Something went wrong starting the simulator.</p>
    <button class="btn-retry" id="retry-btn">Retry</button>
  </div>
</div>

<!-- DESKTOP OS SHELL -->
<div id="os-root" class="os-hidden">

  <!-- DESKTOP SURFACE -->
  <div id="desktop">
    <div class="desktop-icons" id="desktop-icons"></div>
  </div>

  <!-- WINDOW LAYER -->
  <div id="window-layer"></div>

  <!-- NOTIFICATION TOASTS -->
  <div id="toast-layer"></div>

  <!-- TASKBAR -->
  <div class="taskbar">
    <button class="start-btn" id="start-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
    </button>
    <div class="taskbar-apps" id="taskbar-apps"></div>
    <div class="taskbar-tray">
      <button class="tray-btn" id="notif-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot" id="notif-dot" style="display:none"></span>
      </button>
      <div class="tray-clock" id="tray-clock">-</div>
      <button class="tray-btn" id="exit-btn" title="Exit Simulator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- START MENU -->
  <div class="start-menu" id="start-menu" style="display:none">
    <div class="start-menu-header">
      <div class="start-avatar" id="start-avatar">-</div>
      <div class="start-user-info">
        <span class="start-user-name" id="start-user-name">-</span>
        <span class="start-user-meta" id="start-user-meta">-</span>
      </div>
    </div>
    <div class="start-menu-apps" id="start-menu-apps"></div>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div class="notif-panel" id="notif-panel" style="display:none">
    <div class="notif-panel-header">
      <h3>Notifications</h3>
      <button class="notif-clear-btn" id="notif-clear-btn">Clear all</button>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>
</div>

<script src="laptop.js"></script>
<script src="apps/world.js"></script>
<script src="apps/file_explorer.js"></script>
<script src="apps/browser.js"></script>
<script src="apps/email.js"></script>
<script src="apps/terminal.js"></script>
<script src="apps/settings.js"></script>
<script src="apps/notepad.js"></script>
<script src="apps/scanner.js"></script>
</body>
</html>
