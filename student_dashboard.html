<!DOCTYPE html>

<head>

    <style>
        body { background: #020204; color: white; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00f2ff; padding: 3rem; border-radius: 30px; background: rgba(0, 242, 255, 0.03); text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }

        .btn { display: inline-block; padding: 1rem 2rem; border: 1px solid #ffffff33; border-radius: 10px; color: white; text-decoration: none; transition: 0.3s; }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <p class="status">SYSTEM AUTHENTICATED</p>
