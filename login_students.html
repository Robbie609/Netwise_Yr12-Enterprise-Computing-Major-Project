<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwiser | Digital Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --lightblue: #00f2ff;
            --darkblue: #0055ff;
            --cyan: #00ffbf;
            --text-main: #ffffff;
            --text-muted: #9ba1b0;
            --glass: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- NEW ISOLATED BACKGROUND LAYER --- */
        #interactiveGrid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Sits behind everything */
            pointer-events: none; /* Cannot block clicks or inputs */
            background: radial-gradient(circle at center, #0a0e1c 0%, var(--bg) 100%);
        }

        /* --- ORIGINAL LAYOUT (UNTOUCHED) --- */
        .branding-side { flex: 1.2; display: flex; flex-direction: column; justify-content: center; padding: 10%; position: relative; }
        .login-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }

        .logo-container { display: flex; align-items: top; gap: 10px; margin-bottom: 1rem; }
        .logo-img { height: 150px; width: auto; object-fit: contain; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; color: var(--lightblue); letter-spacing: 3px; font-weight: 700; font-size: 1.2rem;}
        
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; line-height: 1.15; margin-bottom: 1.5rem; background: linear-gradient(to right, #fff, #b8c1d1);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: var(--text-muted); font-size: 1.15rem; max-width: 420px; line-height: 1.6; font-weight: 300; }

        .glass-panel { background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3.5rem; width: 100%; max-width: 480px; z-index: 1; position: relative; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
        h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 500; }
        
        .input-box { position: relative; margin-bottom: 1.5rem; }
        input[type="text"], input[type="password"] { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); padding: 1.2rem; border-radius: 12px; color: white; font-size: 1rem; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        input:focus { outline: none; border-color: var(--lightblue); background: rgba(0, 0, 0, 0.4); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 15px var(--accent-glow); }
        input[type="password"] { padding-right: 3rem; }

        .pwd-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; }
        .pwd-toggle:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .pwd-toggle svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s ease; }
        .pwd-slash { stroke-dasharray: 25; stroke-dashoffset: 0; transition: stroke-dashoffset 0.3s ease; }
        .pwd-toggle.visible .pwd-slash { stroke-dashoffset: 25; }

        .btn-access { width: 100%; padding: 1.2rem; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--darkblue), #0099ff); color: white; font-weight: 600; font-family: 'Space Grotesk'; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-top: 1rem; position: relative; overflow: hidden; }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 85, 255, 0.4); }

        .error-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border: 1px solid #ff4b4b !important; }
        @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); } 30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); } }
        .error-text { color: #ff4b4b; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-align: center; font-weight: 500; }

        @media (max-width: 900px) { .branding-side { display: none; } }
    </style>
</head>
<body>

    <canvas id="interactiveGrid"></canvas>

    <div class="branding-side">
        <div class="logo-container">
            <img src="Logo2.png" alt="Netwiser Icon" class="logo-img">
        </div>
        <h1>Welcome to the<br>Digital Future.</h1>
    </div>

    <div class="login-side">
        <div class="glass-panel" id="loginCard">
            <h2>Student Portal</h2>
            <div id="errorMsg" class="error-text">Oops! Incorrect username or password.</div>
            <form id="loginForm">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Student ID" required autocomplete="off">
                </div>
                <div class="input-box">
                    <input type="password" id="passInput" placeholder="Password" required>
                    <div class="pwd-toggle" id="togglePassword" title="Show/Hide Password">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <path class="pwd-slash" d="M3 3l18 18"></path>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="btn-access" id="loginBtn">Enter Academy</button>
            </form>
        </div>
    </div>

    <script>
        /* --- ORIGINAL AUTHENTICATION & UI LOGIC (RETAINED) --- */
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passInput = document.getElementById('passInput');
            const isPassword = passInput.getAttribute('type') === 'password';
            passInput.setAttribute('type', isPassword ? 'text' : 'password');
            this.classList.toggle('visible');
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const card = document.getElementById('loginCard');
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('http://127.0.0.1:8765/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await response.json();
                if (data.success) {
                    card.style.opacity = "0";
                    card.style.transform = "scale(0.95)";
                    setTimeout(() => { window.location.href = "student_dashboard.html"; }, 500);
                } else { throw new Error(); }
            } catch (error) {
                btn.innerText = "Enter Academy";
                btn.style.opacity = "1";
                err.style.display = "block";
                card.classList.remove('error-shake');
                void card.offsetWidth;
                card.classList.add('error-shake');
            }
        });

        /* --- NEW INTERACTIVE GRID SYSTEM (BACKGROUND ONLY) --- */
        const canvas = document.getElementById('interactiveGrid');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouse = { x: -1000, y: -1000 };
        let targetMouse = { x: -1000, y: -1000 };

        const gridSize = 55;
        const glowRadius = 200;
        const ease = 0.1;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Interpolation for smooth trailing
            mouse.x += (targetMouse.x - mouse.x) * ease;
            mouse.y += (targetMouse.y - mouse.y) * ease;

            // 1. Draw Subtle Static Grid
            ctx.beginPath();
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgba(0, 242, 255, 0.06)";
            
            for (let x = 0; x <= width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
            }
            for (let y = 0; y <= height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            ctx.stroke();

            // 2. Draw Reactive Glow (Only affects existing lines)
            ctx.globalCompositeOperation = 'source-atop';
            const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, glowRadius);
            g.addColorStop(0, "rgba(0, 242, 255, 0.9)");
            g.addColorStop(0.5, "rgba(0, 85, 255, 0.3)");
            g.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, width, height);

            // 3. Draw Pulsing Intersections
            ctx.globalCompositeOperation = 'source-over';
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = 0; y <= height; y += gridSize) {
                    const d = Math.hypot(x - mouse.x, y - mouse.y);
                    if (d < glowRadius) {
                        const s = 1 - (d / glowRadius);
                        ctx.fillStyle = `rgba(0, 242, 255, ${s * 0.5})`;
                        ctx.fillRect(x - 1, y - 1, 2, 2);
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
