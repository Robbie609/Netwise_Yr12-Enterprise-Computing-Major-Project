<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwiser | Digital Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --lightblue: #00f2ff;
            --darkblue: #0055ff;
            --cyan: #00ffbf;
            --text-main: #ffffff;
            --text-muted: #9ba1b0;
            --glass: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- IMMERSIVE BACKGROUND & LASERS --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a0e1c 0%, var(--bg) 100%); }

        .laser-field { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: -1; opacity: 0.6; }
        .laser { position: absolute; background: var(--lightblue); box-shadow: 0 0 20px 2px var(--lightblue), 0 0 40px 5px rgba(0, 242, 255, 0.4); border-radius: 50%; opacity: 0; }
        
        .laser-h1 { top: 20%; left: -10%; width: 200px; height: 1px; animation: shoot-right 8s infinite linear; }
        .laser-h2 { top: 75%; right: -10%; width: 300px; height: 2px; animation: shoot-left 12s infinite linear 2s; background: var(--cyan); box-shadow: 0 0 20px 2px var(--cyan); }
        .laser-v1 { left: 30%; top: -10%; width: 1px; height: 250px; animation: shoot-down 10s infinite linear 1s; }
        .laser-v2 { right: 15%; bottom: -10%; width: 2px; height: 150px; animation: shoot-up 14s infinite linear 3s; background: var(--darkblue); box-shadow: 0 0 20px 2px var(--darkblue); }
        .laser-d1 { left: -10%; top: -10%; width: 3px; height: 350px; transform: rotate(45deg); animation: shoot-diag 9s infinite linear 4s; }

        @keyframes shoot-right { 0% { left: -20%; opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { left: 120%; opacity: 0; } }
        @keyframes shoot-left { 0% { right: -20%; opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { right: 120%; opacity: 0; } }
        @keyframes shoot-down { 0% { top: -20%; opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { top: 120%; opacity: 0; } }
        @keyframes shoot-up { 0% { bottom: -20%; opacity: 0; } 10% { opacity: 0.7; } 90% { opacity: 0.7; } 100% { bottom: 120%; opacity: 0; } }
        @keyframes shoot-diag { 0% { left: -20%; top: -20%; opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { left: 120%; top: 120%; opacity: 0; } }

        /* --- LAYOUT --- */
        .branding-side { flex: 1.2; display: flex; flex-direction: column; justify-content: center; padding: 10%; position: relative; }
        .login-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }

        /* --- BRANDING (FIXED WITH LOGO2.PNG) --- */
        .logo-container { display: flex; align-items: center; gap: 15px; margin-bottom: 1.5rem; }
        .logo-img { height: 32px; width: auto; object-fit: contain; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; color: var(--lightblue); letter-spacing: 3px; font-weight: 700; font-size: 1.2rem;}
        
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; line-height: 1.15; margin-bottom: 1.5rem; background: linear-gradient(to right, #fff, #b8c1d1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: var(--text-muted); font-size: 1.15rem; max-width: 420px; line-height: 1.6; font-weight: 300; }

        /* --- LOGIN PANEL --- */
        .glass-panel { background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3.5rem; width: 100%; max-width: 480px; z-index: 1; position: relative; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1); }
        h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 500; }
        
        .input-box { position: relative; margin-bottom: 1.5rem; }
        input[type="text"], input[type="password"] { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); padding: 1.2rem; border-radius: 12px; color: white; font-size: 1rem; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        input:focus { outline: none; border-color: var(--lightblue); background: rgba(0, 0, 0, 0.4); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 15px var(--accent-glow); }
        input[type="password"] { padding-right: 3rem; }

        /* --- PASSWORD TOGGLE --- */
        .pwd-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; }
        .pwd-toggle:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .pwd-toggle svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s ease; }
        .pwd-slash { stroke-dasharray: 25; stroke-dashoffset: 0; transition: stroke-dashoffset 0.3s ease; }
        .pwd-toggle.visible .pwd-slash { stroke-dashoffset: 25; }

        .btn-access { width: 100%; padding: 1.2rem; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--darkblue), #0099ff); color: white; font-weight: 600; font-family: 'Space Grotesk'; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-top: 1rem; position: relative; overflow: hidden; }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 85, 255, 0.4); }

        .error-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border: 1px solid #ff4b4b !important; }
        @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); } 30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); } }
        .error-text { color: #ff4b4b; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-align: center; font-weight: 500; }

        @media (max-width: 900px) { .branding-side { display: none; } }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="laser-field">
        <div class="laser laser-h1"></div>
        <div class="laser laser-h2"></div>
        <div class="laser laser-v1"></div>
        <div class="laser laser-v2"></div>
        <div class="laser laser-d1"></div>
    </div>

    <div class="branding-side">
        <div class="logo-container">
            <img src="Logo2.png" alt="Netwiser Icon" class="logo-img">
            <div class="logo-text">NETWISER</div>
        </div>
        <h1>Welcome to the<br>Digital Future.</h1>
        <p class="sub">Interactive digital learning designed for the next generation. Explore networks, solve puzzles, and grow your tech skills in a safe environment.</p>
    </div>

    <div class="login-side">
        <div class="glass-panel" id="loginCard">
            <h2>Student Portal</h2>
            <div id="errorMsg" class="error-text">Oops! Incorrect username or password.</div>
            <form id="loginForm">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Student ID or Email" required autocomplete="off">
                </div>
                <div class="input-box">
                    <input type="password" id="passInput" placeholder="Password" required>
                    <div class="pwd-toggle" id="togglePassword" title="Show/Hide Password">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <path class="pwd-slash" d="M3 3l18 18"></path>
                        </svg>
                    </div>
                </div>
                
                <button type="submit" class="btn-access" id="loginBtn">Enter Academy</button>
            </form>
        </div>
    </div>

    <script>
        // Password visibility toggle logic
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passInput = document.getElementById('passInput');
            const isPassword = passInput.getAttribute('type') === 'password';
            passInput.setAttribute('type', isPassword ? 'text' : 'password');
            this.classList.toggle('visible');
        });

        // --- REAL AUTHENTICATION LOGIC ---
        // Example student credential used for testing login validation
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const card = document.getElementById('loginCard');
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            btn.style.opacity = "0.7";

            try {
                // Send credentials to the local Python engine bridge
                const response = await fetch('http://127.0.0.1:8765/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await response.json();

                if (data.success) {
                    // Real authentication succeeded
                    card.style.opacity = "0";
                    card.style.transform = "scale(0.95)";
                    setTimeout(() => {
                        window.location.href = "student_dashboard.html";
                    }, 500);
                } else {
                    // Real authentication failed
                    throw new Error();
                }
            } catch (error) {
                // Handle UI failure state securely
                btn.innerText = "Enter Academy";
                btn.style.opacity = "1";
                err.style.display = "block";
                card.classList.remove('error-shake');
                void card.offsetWidth; // Trigger DOM reflow to restart animation
                card.classList.add('error-shake');
            }
        });
    </script>
</body>
</html>
